name: modern-buildkit-ci

on:
  push:
    branches:
      - master
      - 'feature/**'
      - 'release/**'
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${{ env.REGISTRY }}/${REPO}/docker-buildkit-lab" >> "$GITHUB_ENV"
          echo "CACHE_IMAGE=${{ env.REGISTRY }}/${REPO}/docker-buildkit-lab:buildcache" >> "$GITHUB_ENV"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,event=branch
            type=ref,event=pr

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login on all events so registry cache-from works on PRs too
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1) Build & run tests (fail fast)
      - name: Build test stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.modern
          target: test
          load: true
          tags: docker-lab:test
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', env.CACHE_IMAGE) || '' }}
          secrets: |
            pip_token=${{ secrets.PIP_TOKEN }}

      - name: Run unit tests
        run: docker run --rm docker-lab:test

      # 2) Build runtime locally (single arch — load cannot be multi-platform)
      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.modern
          target: runtime
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', env.CACHE_IMAGE) || '' }}

      # 3) Verify before promote
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scanners: vuln,secret
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Smoke test
        run: docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 4) Promote: multi-arch push + provenance/SBOM (non-PR only)
      - name: Push runtime image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.modern
          target: runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max
