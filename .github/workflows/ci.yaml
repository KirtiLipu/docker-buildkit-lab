name: modern-buildkit-ci

on:
  push:
    branches: 
      - master
      - 'feature/**'
      - 'release/**'

  pull_request:

jobs:
  modern:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${REPO}/docker-buildkit-lab" >> "$GITHUB_ENV"
          echo "CACHE_IMAGE=ghcr.io/${REPO}/docker-buildkit-lab:buildcache" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.modern
          target: test
          load: true
          tags: docker-lab:test
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max
          secrets: |
            pip_token=${{ secrets.PIP_TOKEN }}

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.modern
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      - name: Smoke test
        run: docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }}
